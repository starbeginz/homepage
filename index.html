<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스타비긴즈 | 콘텐츠 IP 프랜차이즈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #17121C; overflow: hidden; }
    /* The homepage sits underneath the opaque intro at full opacity from the start:
       only the intro fades out, so there is no dark/light cross-fade dip.
       Background matches home.html's body colour to avoid a flash before it paints. */
    #sb_app {
      position: fixed; inset: 0; width: 100%; height: 100%; border: 0;
      opacity: 1; background: #F5EFE2;
    }
    #sb_intro {
      position: fixed; inset: 0; z-index: 10; background: #17121C;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: clamp(34px, 7vh, 72px); padding: 24px; text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      opacity: 1; transition: opacity .9s cubic-bezier(.4, 0, .2, 1);
      will-change: opacity;
    }
    #sb_phrase {
      color: #F5EFE2; font-size: clamp(22px, 4.6vw, 46px); font-weight: 700;
      line-height: 1.55; letter-spacing: -.5px; max-width: 18em;
    }
    #sb_phrase .hl { color: #E7B85C; }
    #sb_brand {
      opacity: 0; transform: translateY(22px);
      transition: opacity .55s ease, transform .55s ease;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }
    #sb_brand svg { width: min(320px, 50vw); height: auto; display: block; }
    #sb_brand .name { color: #F5EFE2; font-size: clamp(40px, 8.5vw, 100px); font-weight: 900; letter-spacing: 2px; line-height: 1; }
    #sb_brand .sub { color: #E7B85C; font-size: clamp(11px, 1.8vw, 16px); font-weight: 600; letter-spacing: 6px; }
  </style>
</head>
<body>
  <!-- Heavy homepage loads in the background immediately, hidden until ready. -->
  <!-- ?v= is a cache buster: bump it whenever home.html changes, or visitors keep the cached copy. -->
  <iframe id="sb_app" src="home.html?v=20260723a" title="스타비긴즈"></iframe>

  <!-- Lightweight intro: paints instantly, no blank/flicker. -->
  <div id="sb_intro">
    <div id="sb_phrase">
      아직 알려지지 않은 IP를,<br><span class="hl">누구나 아는 IP</span>로 키웁니다
    </div>
    <div id="sb_brand">
      <svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
        <path d="M90 240 C 370 240, 420 70, 600 70 C 780 70, 830 240, 1110 240" fill="none" stroke="#E7B85C" stroke-width="20" stroke-linecap="round"></path>
      </svg>
      <div class="name">스타비긴즈</div>
      <div class="sub">STARBEGINZ</div>
    </div>
  </div>

  <script>
  (function () {
    var intro = document.getElementById('sb_intro');
    var brand = document.getElementById('sb_brand');
    var app = document.getElementById('sb_app');
    var homeReady = false, introDone = false, finished = false;

    function reveal() {
      if (finished || !homeReady || !introDone) { return; }
      finished = true;
      // Match the shell background to the homepage so no dark edge shows through.
      document.documentElement.style.background = '#F5EFE2';
      document.body.style.background = '#F5EFE2';
      intro.style.pointerEvents = 'none';
      // Start the fade on the next frame so the background swap is already committed.
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { intro.style.opacity = '0'; });
      });
      setTimeout(function () { if (intro && intro.parentNode) { intro.parentNode.removeChild(intro); } }, 1100);
    }

    // Intro timeline: phrase is already visible; brand slides in below it.
    setTimeout(function () { brand.style.opacity = '1'; brand.style.transform = 'translateY(0)'; }, 1000);
    setTimeout(function () { introDone = true; reveal(); }, 1900);

    // Homepage signals readiness from inside the iframe (see home.html).
    window.addEventListener('message', function (e) {
      if (e.data === 'sb-home-ready') { homeReady = true; reveal(); }
    });
    // Fallbacks so the homepage is never stuck hidden.
    app.addEventListener('load', function () { setTimeout(function () { homeReady = true; reveal(); }, 1200); });
    setTimeout(function () { homeReady = true; reveal(); }, 12000);
  })();
  </script>
</body>
</html>
